services:
  - type: web
    name: krishinova-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && python3 -m pip install -r ../shared/requirements.txt
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
